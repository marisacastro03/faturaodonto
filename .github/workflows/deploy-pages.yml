# Publica o site na branch gh-pages usando só git (sem actions de terceiros).
# GitHub: Settings → Pages → Branch gh-pages → / (root)
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar arquivos do site (sem .git / .github)
        run: |
          set -e
          mkdir -p /tmp/site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            "${GITHUB_WORKSPACE}/" /tmp/site/

      - name: Push para gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -e
          cd /tmp/site
          git init -b gh-pages
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -m "deploy: ${GIT_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
